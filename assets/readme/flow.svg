<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pipeline: a video upload goes to Gemini 3 Flash for fast visual analysis with thinking disabled, producing a timestamped report and thought signature, which is handed to Gemini 3 Pro with high thinking budget to produce a Playwright script, a code fix, and an explanation">
  <defs>
    <linearGradient id="flowBg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#101a30"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f59e0b" opacity="0.8"/>
    </marker>
  </defs>

  <rect width="1200" height="300" fill="url(#flowBg)"/>
  <rect x="1" y="1" width="1198" height="298" rx="16" fill="none" stroke="#334155"/>

  <!-- Phase labels -->
  <text x="40" y="34" font-family="ui-monospace, Consolas, monospace" font-size="11" letter-spacing="2" fill="#64748b">PHASE 1 · VISUAL ANALYSIS</text>
  <text x="700" y="34" font-family="ui-monospace, Consolas, monospace" font-size="11" letter-spacing="2" fill="#64748b">PHASE 2 · DEEP REASONING</text>

  <!-- Node: video input -->
  <g transform="translate(40,60)">
    <rect width="190" height="130" rx="12" fill="#1e293b" stroke="#334155"/>
    <text x="16" y="30" font-family="ui-monospace, Consolas, monospace" font-size="11" fill="#94a3b8">INPUT</text>
    <text x="16" y="56" font-family="system-ui, sans-serif" font-size="14" fill="#e2e8f0">Bug screen</text>
    <text x="16" y="76" font-family="system-ui, sans-serif" font-size="14" fill="#e2e8f0">recording</text>
    <text x="16" y="104" font-family="ui-monospace, Consolas, monospace" font-size="10.5" fill="#64748b">.mp4 / .webm, &lt;20MB</text>
  </g>

  <line x1="230" y1="125" x2="290" y2="125" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Node: Gemini Flash -->
  <g transform="translate(295,45)">
    <rect width="230" height="160" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-opacity="0.5"/>
    <text x="16" y="28" font-family="ui-monospace, Consolas, monospace" font-size="11" fill="#f59e0b">GEMINI 3 FLASH</text>
    <text x="16" y="52" font-family="system-ui, sans-serif" font-size="13" fill="#e2e8f0">Frame-by-frame scan</text>
    <text x="16" y="72" font-family="ui-monospace, Consolas, monospace" font-size="10.5" fill="#64748b">thinkingBudget: 0</text>
    <text x="16" y="88" font-family="ui-monospace, Consolas, monospace" font-size="10.5" fill="#64748b">(speed over depth)</text>
    <line x1="16" y1="104" x2="214" y2="104" stroke="#334155"/>
    <text x="16" y="124" font-family="ui-monospace, Consolas, monospace" font-size="10.5" fill="#94a3b8">→ events[], summary,</text>
    <text x="16" y="140" font-family="ui-monospace, Consolas, monospace" font-size="10.5" fill="#94a3b8">→ thoughtSignature</text>
  </g>

  <line x1="530" y1="125" x2="590" y2="125" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Node: Gemini Pro -->
  <g transform="translate(595,45)">
    <rect width="230" height="160" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-opacity="0.5"/>
    <text x="16" y="28" font-family="ui-monospace, Consolas, monospace" font-size="11" fill="#f59e0b">GEMINI 3 PRO</text>
    <text x="16" y="52" font-family="system-ui, sans-serif" font-size="13" fill="#e2e8f0">Root-cause reasoning</text>
    <text x="16" y="72" font-family="ui-monospace, Consolas, monospace" font-size="10.5" fill="#64748b">thinkingBudget: 2048</text>
    <text x="16" y="88" font-family="ui-monospace, Consolas, monospace" font-size="10.5" fill="#64748b">(depth over speed)</text>
    <line x1="16" y1="104" x2="214" y2="104" stroke="#334155"/>
    <text x="16" y="124" font-family="ui-monospace, Consolas, monospace" font-size="10.5" fill="#94a3b8">→ takes thoughtSignature</text>
    <text x="16" y="140" font-family="ui-monospace, Consolas, monospace" font-size="10.5" fill="#94a3b8">→ as reasoning context</text>
  </g>

  <line x1="830" y1="125" x2="890" y2="125" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output stack -->
  <g transform="translate(895,30)">
    <rect width="265" height="52" rx="9" fill="#1e293b" stroke="#10b981" stroke-opacity="0.4"/>
    <text x="16" y="22" font-family="ui-monospace, Consolas, monospace" font-size="10.5" fill="#10b981">PLAYWRIGHT SCRIPT</text>
    <text x="16" y="40" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">reproduces the bug exactly</text>
  </g>
  <g transform="translate(895,92)">
    <rect width="265" height="52" rx="9" fill="#1e293b" stroke="#06b6d4" stroke-opacity="0.4"/>
    <text x="16" y="22" font-family="ui-monospace, Consolas, monospace" font-size="10.5" fill="#22d3ee">SUGGESTED CODE FIX</text>
    <text x="16" y="40" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">React/Next.js patch</text>
  </g>
  <g transform="translate(895,154)">
    <rect width="265" height="52" rx="9" fill="#1e293b" stroke="#f59e0b" stroke-opacity="0.4"/>
    <text x="16" y="22" font-family="ui-monospace, Consolas, monospace" font-size="10.5" fill="#f59e0b">EXPLANATION</text>
    <text x="16" y="40" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">plain-language root cause</text>
  </g>

  <text x="40" y="270" font-family="ui-monospace, Consolas, monospace" font-size="11" fill="#475569">Two calls, two jobs: Flash sees fast, Pro thinks slow. Neither wastes the other's compute.</text>
</svg>
