<svg viewBox="0 0 1200 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="UX Archeologist — an autonomous agent that excavates UI bugs from screen recordings and generates Playwright reproduction scripts and code fixes">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#131c33"/>
    </linearGradient>
    <linearGradient id="strataFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="scanGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#f59e0b" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="440" fill="url(#bg)"/>

  <!-- grid pattern, matches the app's own bg-grid-pattern -->
  <g stroke="#1e293b" stroke-width="1">
    <line x1="0" y1="40" x2="1200" y2="40"/><line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="440"/><line x1="900" y1="0" x2="900" y2="440"/>
  </g>

  <!-- scanning beam, matches the app's animate-scan -->
  <rect x="0" y="18" width="1200" height="3" fill="url(#scanGrad)"/>

  <rect x="1" y="1" width="1198" height="438" rx="16" fill="none" stroke="#334155"/>

  <!-- badge / logo mark -->
  <rect x="64" y="70" width="42" height="42" rx="9" fill="#f59e0b"/>
  <text x="85" y="98" text-anchor="middle" font-family="ui-monospace, Consolas, monospace" font-size="17" font-weight="bold" fill="#0f172a">UX</text>

  <text x="118" y="98" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#e2e8f0">Archeologist</text>

  <text x="66" y="150" font-family="ui-monospace, Consolas, monospace" font-size="15" fill="#e2e8f0" opacity="0.85">
    <tspan x="66" dy="0">An agent that excavates UI bugs from screen recordings —</tspan>
    <tspan x="66" dy="26">then hands you a failing Playwright test and the fix.</tspan>
  </text>

  <text x="66" y="216" font-family="ui-monospace, Consolas, monospace" font-size="12" letter-spacing="1.5" fill="#f59e0b">▶ UPLOAD A CLIP · GET A DIAGNOSIS · GET A PATCH</text>

  <!-- Right side: excavation strata, one layer flagged as the anomaly -->
  <g transform="translate(760,60)">
    <rect x="0" y="0" width="380" height="330" rx="10" fill="#0b1220" stroke="#334155"/>
    <text x="16" y="26" font-family="ui-monospace, Consolas, monospace" font-size="11" letter-spacing="2" fill="#94a3b8">EXCAVATION LOG</text>

    <g font-family="ui-monospace, Consolas, monospace" font-size="11">
      <!-- layer 1 -->
      <rect x="14" y="40" width="352" height="46" rx="6" fill="#1e293b"/>
      <text x="26" y="58" fill="#64748b">00:01</text>
      <text x="26" y="74" fill="#e2e8f0">User clicks login</text>

      <!-- layer 2 -->
      <rect x="14" y="92" width="352" height="46" rx="6" fill="#1e293b"/>
      <text x="26" y="110" fill="#64748b">00:04</text>
      <text x="26" y="126" fill="#e2e8f0">Loading state begins</text>

      <!-- anomaly layer, flagged -->
      <rect x="14" y="144" width="352" height="54" rx="6" fill="url(#strataFade)" stroke="#ef4444" stroke-width="1.5"/>
      <circle cx="34" cy="164" r="4" fill="#ef4444"/>
      <text x="26" y="184" fill="#64748b">00:07</text>
      <text x="46" y="164" fill="#fca5a5" font-weight="bold">ANOMALY DETECTED</text>
      <text x="26" y="188" fill="#e2e8f0" font-size="10.5">Submit button logic diverges — no feedback shown</text>

      <!-- layer 4 -->
      <rect x="14" y="204" width="352" height="46" rx="6" fill="#1e293b"/>
      <text x="26" y="222" fill="#64748b">00:11</text>
      <text x="26" y="238" fill="#e2e8f0">User retries, second request fires</text>
    </g>

    <text x="16" y="286" font-family="ui-monospace, Consolas, monospace" font-size="11" fill="#10b981">✓ thoughtSignature preserved for reasoning pass</text>
    <text x="16" y="306" font-family="ui-monospace, Consolas, monospace" font-size="11" fill="#94a3b8" opacity="0.8">→ handing off to Gemini 3 Pro</text>
  </g>
</svg>
